<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>China Bridge — Direct Sourcing from China</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #000000;
    --white:   #ffffff;
    --gray-1:  #f5f5f7;
    --gray-2:  #e8e8ed;
    --gray-3:  #6e6e73;
    --gray-4:  #1d1d1f;
    --blue:    #0071e3;
    --blue-h:  #0077ed;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    background: var(--white);
    color: var(--gray-4);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    height: 48px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px;
  }
  .nav-logo {
    font-size: 1rem; font-weight: 600; letter-spacing: -0.02em;
    color: var(--gray-4); text-decoration: none;
  }
  .nav-links {
    display: flex; gap: 0; list-style: none;
    position: absolute; left: 50%; transform: translateX(-50%);
  }
  .nav-links a {
    font-size: 0.75rem; color: var(--gray-4); text-decoration: none;
    padding: 0 12px; opacity: 0.85; transition: opacity 0.15s;
  }
  .nav-links a:hover { opacity: 1; }
  .nav-cta {
    font-size: 0.75rem; color: var(--blue); text-decoration: none;
    transition: opacity 0.15s;
  }
  .nav-cta:hover { opacity: 0.8; }

  /* ── HERO ── */
  .hero {
    min-height: 100svh;
    background: var(--black);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    width: 900px; height: 900px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 0.95rem; font-weight: 400;
    color: #f5f5f7; opacity: 0.7;
    margin-bottom: 0.5rem;
    animation: fadeDown 0.8s ease both;
  }
  .hero-h1 {
    font-size: clamp(3.2rem, 8vw, 7rem);
    font-weight: 700; line-height: 1.04;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 1.2rem;
    animation: fadeDown 0.8s 0.1s ease both;
  }
  .hero-sub {
    font-size: clamp(1rem, 2.2vw, 1.5rem);
    font-weight: 400; line-height: 1.5;
    color: rgba(245,245,247,0.72);
    max-width: 640px;
    margin: 0 auto 2.2rem;
    animation: fadeDown 0.8s 0.2s ease both;
  }
  .hero-actions {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    animation: fadeDown 0.8s 0.3s ease both;
  }
  .btn-blue {
    background: var(--blue); color: var(--white);
    padding: 0.65rem 1.5rem; font-size: 0.95rem; font-weight: 400;
    border-radius: 980px; border: none; cursor: pointer;
    text-decoration: none; display: inline-block;
    transition: background 0.2s;
  }
  .btn-blue:hover { background: var(--blue-h); }
  .btn-outline {
    background: transparent; color: #2997ff;
    padding: 0.65rem 1.5rem; font-size: 0.95rem; font-weight: 400;
    border-radius: 980px; border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; text-decoration: none; display: inline-block;
    transition: border-color 0.2s;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.45); }
  .hero-scroll-hint {
    position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    opacity: 0.35;
    animation: fadeDown 1s 0.8s ease both;
  }
  .scroll-arrow {
    width: 1px; height: 36px; background: white;
    animation: scrollPulse 2s ease-in-out infinite;
  }

  /* ── STATS BAND ── */
  .stats-band {
    background: var(--gray-1);
    padding: 60px 24px;
    display: flex; justify-content: center;
  }
  .stats-inner {
    display: grid; grid-template-columns: repeat(4, 1fr);
    max-width: 900px; width: 100%;
  }
  .stat-item {
    text-align: center; padding: 24px 16px;
    border-right: 1px solid var(--gray-2);
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item.visible { opacity: 1; transform: translateY(0); }
  .stat-number {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700; letter-spacing: -0.03em;
    color: var(--gray-4); line-height: 1; margin-bottom: 0.3rem;
  }
  .stat-label { font-size: 0.82rem; color: var(--gray-3); line-height: 1.4; }

  /* ── TICKER ── */
  .ticker {
    background: var(--black);
    padding: 14px 0; overflow: hidden; white-space: nowrap;
  }
  .ticker-track { display: inline-block; animation: ticker 30s linear infinite; }
  .ticker-item {
    display: inline-block;
    font-size: 0.8rem; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45); padding: 0 2.5rem;
  }
  .ticker-item::before { content: '·'; margin-right: 2.5rem; color: rgba(255,255,255,0.2); }

  /* ── SECTION BASE ── */
  .ap-section { padding: 120px 24px; text-align: center; }
  .section-eyebrow {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--blue); margin-bottom: 0.5rem;
  }
  .section-h2 {
    font-size: clamp(2rem, 4.5vw, 3.5rem);
    font-weight: 700; line-height: 1.07; letter-spacing: -0.025em;
    color: var(--gray-4); margin-bottom: 1rem;
  }
  .section-sub {
    font-size: clamp(0.95rem, 1.8vw, 1.2rem);
    font-weight: 400; line-height: 1.6; color: var(--gray-3);
    max-width: 580px; margin: 0 auto 3.5rem;
  }

  /* ── HOW IT WORKS ── */
  .steps-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 2px; max-width: 1200px; margin: 0 auto;
    background: var(--gray-2); border-radius: 20px; overflow: hidden;
    border: 1px solid var(--gray-2);
  }
  .step-card {
    background: var(--white); padding: 3rem 2rem; text-align: left;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .step-card.visible { opacity: 1; transform: translateY(0); }
  .step-num {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--blue); margin-bottom: 1.2rem;
  }
  .step-icon { font-size: 2rem; margin-bottom: 1rem; display: block; }
  .step-title {
    font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
    color: var(--gray-4); margin-bottom: 0.6rem; line-height: 1.3;
  }
  .step-desc { font-size: 0.88rem; color: var(--gray-3); line-height: 1.65; }

  /* ── CATEGORIES ── */
  .categories-section { background: var(--gray-1); }
  .cat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px; max-width: 1200px; margin: 0 auto;
    background: var(--gray-2); border-radius: 20px; overflow: hidden;
    border: 1px solid var(--gray-2);
  }
  .cat-card {
    background: var(--white); padding: 2.5rem 2rem; text-align: left;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .cat-card.visible { opacity: 1; transform: translateY(0); }
  .cat-icon { font-size: 2.2rem; margin-bottom: 1rem; display: block; }
  .cat-title {
    font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
    color: var(--gray-4); margin-bottom: 0.5rem;
  }
  .cat-desc { font-size: 0.85rem; color: var(--gray-3); line-height: 1.65; }

  /* ── WHY ── */
  .why-section { background: var(--black); }
  .why-section .section-h2 { color: var(--white); }
  .why-section .section-sub { color: rgba(245,245,247,0.6); }
  .why-section .section-eyebrow { color: #2997ff; }
  .why-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 2px; max-width: 1200px; margin: 0 auto;
    background: #1c1c1e; border-radius: 20px; overflow: hidden;
    border: 1px solid #1c1c1e;
  }
  .why-card {
    background: #111111; padding: 3rem 2.5rem;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .why-card.visible { opacity: 1; transform: translateY(0); }
  .why-card.wide { grid-column: span 2; }
  .why-card-label {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #2997ff; margin-bottom: 0.6rem;
  }
  .why-big-stat {
    font-size: clamp(3rem, 6vw, 5rem);
    font-weight: 700; letter-spacing: -0.04em;
    color: var(--white); line-height: 1; margin-bottom: 0.5rem;
  }
  .why-card-title {
    font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    font-weight: 700; letter-spacing: -0.02em;
    color: var(--white); line-height: 1.2; margin-bottom: 0.8rem;
  }
  .why-card-desc {
    font-size: 0.92rem; color: rgba(245,245,247,0.5);
    line-height: 1.7; max-width: 460px;
  }
  .why-card-icon { font-size: 2.5rem; margin-bottom: 1.5rem; display: block; }

  /* ── TESTIMONIALS ── */
  .testi-section { background: var(--gray-1); }
  .testi-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px; max-width: 1200px; margin: 0 auto;
    background: var(--gray-2); border-radius: 20px; overflow: hidden;
    border: 1px solid var(--gray-2);
  }
  .testi-card {
    background: var(--white); padding: 2.5rem 2rem; text-align: left;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .testi-card.visible { opacity: 1; transform: translateY(0); }
  .testi-stars { color: #ff9f0a; font-size: 0.9rem; margin-bottom: 1rem; letter-spacing: 2px; }
  .testi-text {
    font-size: 0.95rem; line-height: 1.7; color: var(--gray-4);
    margin-bottom: 1.5rem; font-style: italic;
  }
  .testi-name { font-size: 0.85rem; font-weight: 600; color: var(--gray-4); }
  .testi-role { font-size: 0.8rem; color: var(--gray-3); margin-top: 0.15rem; }

  /* ── CTA ── */
  .cta-section { background: var(--white); padding: 120px 24px; text-align: center; }
  .cta-box {
    background: var(--gray-1); border-radius: 20px;
    padding: 5rem 3rem; max-width: 860px; margin: 0 auto;
  }
  .cta-h2 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700; letter-spacing: -0.025em;
    color: var(--gray-4); margin-bottom: 0.8rem;
  }
  .cta-sub {
    font-size: 1.1rem; color: var(--gray-3); line-height: 1.6;
    max-width: 520px; margin: 0 auto 2.5rem;
  }
  .cta-form {
    display: flex; flex-direction: column;
    gap: 0.8rem; max-width: 400px; margin: 0 auto;
  }
  .cta-form input {
    background: var(--white
